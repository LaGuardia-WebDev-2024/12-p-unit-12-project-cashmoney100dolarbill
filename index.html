<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Unit 12 Project</title>

    <!-- Additional Feature -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Roboto&display=swap" rel="stylesheet">

    <link href="style.css" rel="stylesheet" type="text/css" />
  </head>

  <body>

    <h1>Quiz About [Me]</h1>

    <!-- Added Images -->
    <img src="https://picsum.photos/150">
    <img src="https://picsum.photos/151">
    <img src="https://picsum.photos/152">

    <hr />

    <!-- Movie Question -->

    <form id="movie-form">

      <label>

        🎥 What is my favorite movie?

        <select id="movie-answer">

          <option value="movie1">movie 1</option>
          <option value="movie2">movie 2</option>
          <option value="movie3">movie 3</option>
          <option value="movie4">movie 4</option>

        </select>

      </label>

      <button type="submit">Check Movie Answer</button>

    </form>

    <div id="movie-result">

      <p id="movie-text"></p>

    </div>

    <hr />

    <!-- Book Question -->

    <form id="book-form">

      <label>

        📖 What is my favorite book?

        <select id="book-answer">

          <option value="book1">book 1</option>
          <option value="book2">book 2</option>
          <option value="book3">book 3</option>
          <option value="book4">book 4</option>

        </select>

      </label>

      <button type="submit">Check Book Answer</button>

    </form>

    <div id="book-result">

      <p id="book-text"></p>

    </div>

    <!-- Custom Animation Object -->
    <div id="box"></div>

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/2.1.4/jquery.min.js"></script>

    <script>

      //========================Movie Question jQuery Code

      $("#movie-form").on("submit", function (event) {

        event.preventDefault();

        var $answer = $("#movie-answer");

        var answer = $answer.val();

        if (answer === "movie1") {

          $("#movie-text")
          .text("YESSSS!")
          .fadeOut(500)
          .fadeIn(500);

        }

        else {

          $("#movie-text").text("Try Again!");

        }

      });


      //=======================Book Question jQuery Code

      $("#book-form").on("submit", function (event) {

        event.preventDefault();

        var $answer = $("#book-answer");

        var answer = $answer.val();

        if (answer === "book1") {

          $("#book-text").text("YESSSS!");

          $("#box").animate({

            left:"200px",
            width:"150px",
            height:"150px"

          });

        }

        else {

          $("#book-text").text("Try Again!");

        }

      });

    </script>

  </body>

  <!--- Taken From Khan Academy HTML/JS: Making webpages interactive with jQuery-->

</html>
